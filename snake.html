<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #666;
      font-size: 10px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
      z-index: 100;
    }

    .back-btn:hover {
      color: #00ff88;
    }

    .back-btn::before {
      content: '←';
    }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .score-board {
      display: flex;
      gap: 60px;
      color: #fff;
      font-size: 14px;
    }

    .score-item {
      text-align: center;
    }

    .score-label {
      color: #888;
      font-size: 10px;
      margin-bottom: 8px;
    }

    .score-value {
      color: #00ff88;
      font-size: 20px;
    }

    #gameCanvas {
      border: 4px solid #00ff88;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.3),
                  inset 0 0 60px rgba(0, 0, 0, 0.3);
    }

    .controls {
      color: #666;
      font-size: 8px;
      text-align: center;
      line-height: 1.8;
    }

    .controls span {
      color: #00ff88;
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">BACK</a>

  <div class="game-container">
    <div class="score-board">
      <div class="score-item">
        <div class="score-label">SCORE</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">BEST</div>
        <div class="score-value" id="best">0</div>
      </div>
    </div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <div class="controls">
      <span>↑↓←→</span> 移动 &nbsp;&nbsp; <span>SPACE</span> 暂停 &nbsp;&nbsp; <span>ENTER</span> 开始/重玩
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');

    const GRID_SIZE = 20;
    const CELL_SIZE = canvas.width / GRID_SIZE;
    const GAME_SPEED = 150;

    let snake, direction, nextDirection, food, score, gameState, gameLoop, lastTime, foodPulse;

    const DIRECTIONS = {
      UP: { x: 0, y: -1 },
      DOWN: { x: 0, y: 1 },
      LEFT: { x: -1, y: 0 },
      RIGHT: { x: 1, y: 0 }
    };

    function init() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = DIRECTIONS.RIGHT;
      nextDirection = DIRECTIONS.RIGHT;
      score = 0;
      gameState = 'start';
      foodPulse = 0;
      updateScore();
      bestEl.textContent = localStorage.getItem('snakeBest') || 0;
    }

    function spawnFood() {
      let valid = false;
      while (!valid) {
        food = {
          x: Math.floor(Math.random() * GRID_SIZE),
          y: Math.floor(Math.random() * GRID_SIZE)
        };
        valid = !snake.some(seg => seg.x === food.x && seg.y === food.y);
      }
    }

    function updateScore() {
      scoreEl.textContent = score;
    }

    function updateBest() {
      const best = parseInt(localStorage.getItem('snakeBest') || 0);
      if (score > best) {
        localStorage.setItem('snakeBest', score);
        bestEl.textContent = score;
      }
    }

    function update() {
      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
        gameOver();
        return;
      }

      if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
        gameOver();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        updateScore();
        spawnFood();
      } else {
        snake.pop();
      }
    }

    function gameOver() {
      gameState = 'over';
      updateBest();
      if (gameLoop) clearInterval(gameLoop);
    }

    function drawGrid() {
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= GRID_SIZE; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE, 0);
        ctx.lineTo(i * CELL_SIZE, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * CELL_SIZE);
        ctx.lineTo(canvas.width, i * CELL_SIZE);
        ctx.stroke();
      }
    }

    function drawSnake() {
      snake.forEach((seg, i) => {
        const progress = i / snake.length;
        const r = Math.floor(0 + progress * 0);
        const g = Math.floor(255 - progress * 80);
        const b = Math.floor(136 - progress * 54);

        const x = seg.x * CELL_SIZE + 2;
        const y = seg.y * CELL_SIZE + 2;
        const size = CELL_SIZE - 4;

        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = i === 0 ? 15 : 5;

        ctx.beginPath();
        ctx.roundRect(x, y, size, size, 6);
        ctx.fill();

        ctx.shadowBlur = 0;
      });
    }

    function drawFood() {
      foodPulse += 0.1;
      const pulse = Math.sin(foodPulse) * 0.2 + 0.8;
      const x = food.x * CELL_SIZE + CELL_SIZE / 2;
      const y = food.y * CELL_SIZE + CELL_SIZE / 2;
      const radius = (CELL_SIZE / 2 - 4) * pulse;

      ctx.shadowColor = '#ff4757';
      ctx.shadowBlur = 20 * pulse;
      ctx.fillStyle = '#ff4757';
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawOverlay(text, subtext) {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#00ff88';
      ctx.font = '24px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 20;
      ctx.fillText(text, canvas.width / 2, canvas.height / 2 - 20);

      if (subtext) {
        ctx.fillStyle = '#888';
        ctx.font = '10px "Press Start 2P"';
        ctx.shadowBlur = 0;
        ctx.fillText(subtext, canvas.width / 2, canvas.height / 2 + 30);
      }
    }

    function draw() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawGrid();

      if (gameState === 'start') {
        drawOverlay('SNAKE', 'Press ENTER to start');
      } else if (gameState === 'playing') {
        drawFood();
        drawSnake();
      } else if (gameState === 'paused') {
        drawFood();
        drawSnake();
        drawOverlay('PAUSED', 'Press SPACE to continue');
      } else if (gameState === 'over') {
        drawSnake();
        drawOverlay('GAME OVER', `Score: ${score}  Press ENTER to retry`);
      }
    }

    function gameStart() {
      if (gameState === 'start' || gameState === 'over') {
        init();
        spawnFood();
        gameState = 'playing';
        gameLoop = setInterval(() => {
          update();
          draw();
        }, GAME_SPEED);
      }
    }

    function togglePause() {
      if (gameState === 'playing') {
        gameState = 'paused';
        clearInterval(gameLoop);
        draw();
      } else if (gameState === 'paused') {
        gameState = 'playing';
        gameLoop = setInterval(() => {
          update();
          draw();
        }, GAME_SPEED);
      }
    }

    document.addEventListener('keydown', (e) => {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space', 'Enter'].includes(e.code)) {
        e.preventDefault();
      }

      if (e.code === 'Enter') {
        if (gameState === 'start' || gameState === 'over') {
          gameStart();
        }
      }

      if (e.code === 'Space') {
        togglePause();
      }

      if (gameState !== 'playing') return;

      const keyMap = {
        'ArrowUp': DIRECTIONS.UP,
        'ArrowDown': DIRECTIONS.DOWN,
        'ArrowLeft': DIRECTIONS.LEFT,
        'ArrowRight': DIRECTIONS.RIGHT
      };

      if (keyMap[e.code]) {
        const newDir = keyMap[e.code];
        const isOpposite = (newDir.x + direction.x === 0 && newDir.y + direction.y === 0);
        if (!isOpposite) {
          nextDirection = newDir;
        }
      }
    });

    function animate(time) {
      if (gameState === 'playing') {
        draw();
      }
      requestAnimationFrame(animate);
    }

    init();
    draw();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
