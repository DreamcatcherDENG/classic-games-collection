<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    .back-btn {
      position: fixed; top: 20px; left: 20px;
      color: #666; font-size: 10px; text-decoration: none;
      display: flex; align-items: center; gap: 8px;
      transition: color 0.2s; z-index: 100;
    }
    .back-btn:hover { color: #4caf50; }
    .back-btn::before { content: '\2190'; }

    .game-container {
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
    }

    .score-board {
      display: flex; gap: 80px; color: #fff; font-size: 14px;
    }
    .score-item { text-align: center; }
    .score-label { color: #888; font-size: 10px; margin-bottom: 8px; }
    .score-value { color: #4caf50; font-size: 16px; }

    #gameCanvas {
      border: 4px solid #4caf50;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(76, 175, 80, 0.3);
    }

    .controls {
      color: #666; font-size: 8px; text-align: center; line-height: 1.8;
    }
    .controls span { color: #4caf50; }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">BACK</a>
  <div class="game-container">
    <div class="score-board">
      <div class="score-item">
        <div class="score-label">SCORE</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">BEST</div>
        <div class="score-value" id="best">0</div>
      </div>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="controls">
      <span>点击/空格</span> 飞翔 &nbsp;&nbsp; <span>ENTER</span> 开始/重玩
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const GRAVITY = 0.5, JUMP_FORCE = -8, GAP_SIZE = 150, PIPE_WIDTH = 60;
    const PIPE_SPEED = 2;
    const BIRD_SIZE = 30;

    let bird, pipes, score, gameState, bestScore, animationFrame;

    function init() {
      bird = { x: 100, y: H / 2, velocity: 0, size: BIRD_SIZE };
      pipes = [];
      score = 0;
      gameState = 'start';
      const best = localStorage.getItem('flappyBest');
      bestScore = best ? parseInt(best) : 0;
      document.getElementById('best').textContent = bestScore;
    }

    function createPipe() {
      const minHeight = 50;
      const maxHeight = H - GAP_SIZE - 50;
      const height = Math.random() * (maxHeight - minHeight) + minHeight;
      pipes.push({
        x: W,
        topHeight: height,
        bottomY: height + GAP_SIZE,
        passed: false
      });
    }

    function update() {
      if (gameState !== 'playing') return;

      bird.velocity += GRAVITY;
      bird.y += bird.velocity;

      pipes = pipes.filter(pipe => pipe.x > -PIPE_WIDTH);
      pipes.forEach(pipe => {
        pipe.x -= PIPE_SPEED;

        if (!pipe.passed && pipe.x + PIPE_WIDTH < bird.x) {
          pipe.passed = true;
          score++;
          document.getElementById('score').textContent = score;
        }

        if (bird.x + bird.size > pipe.x && bird.x < pipe.x + PIPE_WIDTH) {
          if (bird.y < pipe.topHeight || bird.y + bird.size > pipe.bottomY) {
            gameOver();
          }
        }
      });

      if (bird.y < 0 || bird.y + bird.size > H) {
        gameOver();
      }

      if (pipes.length === 0 || pipes[pipes.length - 1].x < W - 200) {
        createPipe();
      }
    }

    function gameOver() {
      gameState = 'over';
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('flappyBest', bestScore);
        document.getElementById('best').textContent = bestScore;
      }
    }

    function draw() {
      ctx.fillStyle = '#87ceeb';
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = '#4caf50';
      ctx.fillRect(0, H - 100, W, 100);

      ctx.fillStyle = '#8b4513';
      ctx.fillRect(0, H - 100, W, 20);

      ctx.shadowColor = '#4caf50';
      ctx.shadowBlur = 10;

      pipes.forEach(pipe => {
        ctx.fillStyle = '#4caf50';
        ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
        ctx.fillRect(pipe.x, pipe.bottomY, PIPE_WIDTH, H - pipe.bottomY);

        ctx.fillStyle = '#2e7d32';
        ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, PIPE_WIDTH + 10, 30);
        ctx.fillRect(pipe.x - 5, pipe.bottomY, PIPE_WIDTH + 10, 30);
      });

      ctx.shadowBlur = 0;

      ctx.fillStyle = '#ffeb3b';
      ctx.beginPath();
      ctx.arc(bird.x + bird.size / 2, bird.y + bird.size / 2, bird.size / 2, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(bird.x + bird.size / 2 + 5, bird.y + bird.size / 2, 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(bird.x + bird.size / 2, bird.y + bird.size / 2 + 3);
      ctx.lineTo(bird.x + bird.size / 2 + 10, bird.y + bird.size / 2 + 5);
      ctx.lineTo(bird.x + bird.size / 2 + 5, bird.y + bird.size / 2 + 8);
      ctx.closePath();
      ctx.fill();

      if (gameState === 'start') {
        drawOverlay('FLAPFLAP', 'Press SPACE or ENTER to start');
      } else if (gameState === 'over') {
        drawOverlay('GAME OVER', `Score: ${score}  Press to retry`);
      }
    }

    function drawOverlay(text, sub) {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = '#fff';
      ctx.font = '20px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 10;
      ctx.fillText(text, W / 2, H / 2 - 30);
      ctx.font = '10px "Press Start 2P"';
      ctx.fillText(sub, W / 2, H / 2 + 10);
      ctx.shadowBlur = 0;
    }

    function jump() {
      if (gameState === 'start') {
        gameState = 'playing';
        createPipe();
      } else if (gameState === 'playing') {
        bird.velocity = JUMP_FORCE;
      } else if (gameState === 'over') {
        init();
        gameState = 'start';
      }
    }

    canvas.addEventListener('click', jump);
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        jump();
      }
    });

    function gameLoop() {
      update();
      draw();
      animationFrame = requestAnimationFrame(gameLoop);
    }

    init();
    draw();
    gameLoop();
  </script>
</body>
</html>
