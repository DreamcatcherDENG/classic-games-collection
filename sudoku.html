<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数独</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    .back-btn {
      position: fixed; top: 20px; left: 20px;
      color: #666; font-size: 10px; text-decoration: none;
      display: flex; align-items: center; gap: 8px;
      transition: color 0.2s; z-index: 100;
    }
    .back-btn:hover { color: #9c27b0; }
    .back-btn::before { content: '\2190'; }

    .game-container {
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
    }

    .score-board {
      display: flex; gap: 60px; color: #fff; font-size: 14px;
    }
    .score-item { text-align: center; }
    .score-label { color: #888; font-size: 10px; margin-bottom: 8px; }
    .score-value { color: #9c27b0; font-size: 16px; }

    #gameCanvas {
      border: 4px solid #9c27b0;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(156, 39, 176, 0.3);
    }

    .controls {
      color: #666; font-size: 8px; text-align: center; line-height: 1.8;
    }
    .controls span { color: #9c27b0; }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">BACK</a>
  <div class="game-container">
    <div class="score-board">
      <div class="score-item">
        <div class="score-label">TIME</div>
        <div class="score-value" id="timer">000:00</div>
      </div>
      <div class="score-item">
        <div class="score-label">DIFFICULTY</div>
        <div class="score-value" id="difficulty">MEDIUM</div>
      </div>
    </div>
    <canvas id="gameCanvas" width="450" height="450"></canvas>
    <div class="controls">
      <span>1-9</span> 填入数字 &nbsp;&nbsp; <span>点击</span> 选择格子 &nbsp;&nbsp; <span>ENTER</span> 新游戏
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const CELL_SIZE = W / 9;
    const PUZZLE = [
      [5,3,0,0,7,0,0,0,0],
      [6,0,0,1,9,5,0,0,0],
      [0,9,8,0,0,0,0,6,0],
      [8,0,0,0,6,0,0,0,3],
      [4,0,0,8,0,3,0,0,1],
      [7,0,0,0,2,0,0,0,6],
      [0,6,0,0,0,0,2,8,0],
      [0,0,0,4,1,9,0,0,5],
      [0,0,0,0,8,0,0,7,9]
    ];

    let grid, selectedCell, timer, startTime, difficulty;

    function init() {
      grid = PUZZLE.map(row => row.map(val => ({ value: val, fixed: val !== 0 })));
      selectedCell = null;
      timer = 0;
      startTime = Date.now();
      difficulty = 'MEDIUM';
      document.getElementById('difficulty').textContent = difficulty;
      updateTimer();
    }

    function updateTimer() {
      if (startTime) {
        timer = Math.floor((Date.now() - startTime) / 1000);
        const minutes = Math.floor(timer / 60).toString().padStart(2, '0');
        const seconds = (timer % 60).toString().padStart(2, '0');
        document.getElementById('timer').textContent = `${minutes}:${seconds}`;
      }
      setTimeout(updateTimer, 1000);
    }

    function draw() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 9; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE, 0);
        ctx.lineTo(i * CELL_SIZE, H);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * CELL_SIZE);
        ctx.lineTo(W, i * CELL_SIZE);
        ctx.stroke();
      }

      ctx.strokeStyle = '#9c27b0';
      ctx.lineWidth = 3;
      for (let i = 0; i <= 9; i += 3) {
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE, 0);
        ctx.lineTo(i * CELL_SIZE, H);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * CELL_SIZE);
        ctx.lineTo(W, i * CELL_SIZE);
        ctx.stroke();
      }

      for (let y = 0; y < 9; y++) {
        for (let x = 0; x < 9; x++) {
          if (grid[y][x].value !== 0) {
            ctx.fillStyle = grid[y][x].fixed ? '#9c27b0' : '#00ff00';
            ctx.font = 'bold 18px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(grid[y][x].value, x * CELL_SIZE + CELL_SIZE / 2, y * CELL_SIZE + CELL_SIZE / 2);
          }
        }
      }

      if (selectedCell) {
        ctx.fillStyle = 'rgba(156, 39, 176, 0.2)';
        ctx.fillRect(selectedCell.x * CELL_SIZE, selectedCell.y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
      }

      checkWin();
    }

    function getMousePos(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: Math.floor((e.clientX - rect.left) / CELL_SIZE),
        y: Math.floor((e.clientY - rect.top) / CELL_SIZE)
      };
    }

    function isValid(x, y, num) {
      for (let i = 0; i < 9; i++) {
        if (i !== y && grid[i][x].value === num) return false;
        if (i !== x && grid[y][i].value === num) return false;
      }

      const boxX = Math.floor(x / 3) * 3;
      const boxY = Math.floor(y / 3) * 3;
      for (let dy = 0; dy < 3; dy++) {
        for (let dx = 0; dx < 3; dx++) {
          const nx = boxX + dx;
          const ny = boxY + dy;
          if ((nx !== x || ny !== y) && grid[ny][nx].value === num) return false;
        }
      }
      return true;
    }

    function checkWin() {
      for (let y = 0; y < 9; y++) {
        for (let x = 0; x < 9; x++) {
          if (grid[y][x].value === 0) return false;
        }
      }

      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = '#4caf50';
      ctx.font = '20px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.shadowColor = '#4caf50';
      ctx.shadowBlur = 20;
      ctx.fillText('COMPLETED!', W / 2, H / 2 - 10);
      ctx.shadowBlur = 0;

      return true;
    }

    canvas.addEventListener('click', e => {
      const pos = getMousePos(e);
      selectedCell = pos;
      draw();
    });

    document.addEventListener('keydown', e => {
      if (!selectedCell) return;

      if (e.key >= '1' && e.key <= '9') {
        const num = parseInt(e.key);
        if (!grid[selectedCell.y][selectedCell.x].fixed && isValid(selectedCell.x, selectedCell.y, num)) {
          grid[selectedCell.y][selectedCell.x].value = num;
          draw();
        }
      } else if (e.key === 'Delete' || e.key === 'Backspace') {
        if (!grid[selectedCell.y][selectedCell.x].fixed) {
          grid[selectedCell.y][selectedCell.x].value = 0;
          draw();
        }
      }
    });

    document.addEventListener('keydown', e => {
      if (e.code === 'Enter') {
        init();
        draw();
      }
    });

    init();
    draw();
  </script>
</body>
</html>
