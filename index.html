<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>经典游戏合集</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0a1a;
      font-family: 'Press Start 2P', monospace;
      color: #fff;
      overflow-x: hidden;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 80px;
    }

    .header h1 {
      font-size: 28px;
      color: #00ff88;
      text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
      margin-bottom: 16px;
      letter-spacing: 4px;
    }

    .header p {
      font-size: 10px;
      color: #666;
      letter-spacing: 2px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 30px;
      justify-items: center;
    }

    .game-card {
      width: 260px;
      height: 300px;
      background: #1a1a2e;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      padding: 2px;
      background: linear-gradient(135deg, #00ff88, #9d4edd);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .game-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 60px rgba(0, 255, 136, 0.2);
    }

    .game-card:hover::before {
      opacity: 1;
    }

    .game-preview {
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-preview img {
      max-width: 100%;
      max-height: 100%;
    }

    .game-title {
      font-size: 14px;
      color: #fff;
      letter-spacing: 2px;
    }

    .footer {
      text-align: center;
      margin-top: 80px;
      font-size: 8px;
      color: #444;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>CLASSIC GAMES</h1>
      <p>SELECT A GAME TO PLAY</p>
    </header>

    <div class="games-grid" id="games-grid">
      <!-- Dynamically populated by script -->
    </div>

    <footer class="footer">
      USE ARROW KEYS TO PLAY
    </footer>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('games.json')
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.json();
        })
        .then(games => {
          const grid = document.getElementById('games-grid');
          games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => location.href = game.path;
            card.innerHTML = `
              <div class="game-preview">
                <img src="${game.thumbnail}" alt="${game.name} thumbnail" style="width: 100%; height: 100%;">
              </div>
              <div class="game-title">${game.name}</div>
            `;
            grid.appendChild(card);
          });
        })
        .catch(error => {
          console.error('Error loading games:', error);
          const grid = document.getElementById('games-grid');
          grid.innerHTML = '<p>Error loading games. Please check console.</p>';
        });
    });
  </script>
</body>
</html>
